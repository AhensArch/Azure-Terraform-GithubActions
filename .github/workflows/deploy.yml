name : 'Terraform Deploy to Azure DevOps'

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
    terraform:
        name: 'Terraform'
        runs-on: ubuntu-latest

        #These env vars will tell terraform how to log in
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

        steps:
        - name: 'Checkout Repository'
          uses: actions/checkout@v4

        - name: Azure Login
          uses: azure/login@v2
          with:
            creds: '{"clientId":"${{ secrets.AZURE_USERNAME }}","clientSecret":"${{ secrets.AZURE_PASSWORD }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

        - name: 'Setup Terraform'
          uses: hashicorp/setup-terraform@v3

        - name: 'Terraform Init'
          run: terraform init       

        - name: 'Terraform plan'
          run: terraform plan       

        - name: 'Terraform apply'
          run: terraform apply -auto-approve